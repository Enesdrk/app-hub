<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallen Apps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

        :root {
            --bg: #efede9;
            --surface: #ffffff;
            --surface-soft: #f5f4f2;
            --text: #101114;
            --muted: #64686f;
            --border: #d9d7d2;
            --shadow: 0 10px 32px rgba(16, 17, 20, 0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% -10%, #ffffff 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #e5dfd4 0%, transparent 42%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        .card {
            width: min(100%, 460px);
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid #d8d4cd;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .loader-view {
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
            letter-spacing: 0.01em;
        }

        .loader {
            width: 42px;
            height: 42px;
            margin: 0 auto 12px;
            border: 3px solid #d6d2ca;
            border-top-color: #17191d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .desktop-view {
            display: none;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 22px;
        }

        .logo {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--surface-soft);
            box-shadow: 0 6px 18px rgba(16, 17, 20, 0.12);
        }

        .logo-fallback {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface-soft);
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #2a2e35;
        }

        h1 {
            margin: 14px 0 6px;
            font-size: 1.55rem;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 18px;
        }

        .store-link {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 16px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            font-weight: 600;
            transition: transform 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
        }

        .store-link:hover {
            transform: translateY(-1px);
            background: var(--surface-soft);
            box-shadow: 0 8px 18px rgba(16, 17, 20, 0.08);
        }

        .store-link:active {
            transform: translateY(0);
        }

        .store-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footnote {
            margin-top: 14px;
            text-align: center;
            font-size: 0.82rem;
            color: #80858d;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: 20px;
            }

            .logo,
            .logo-fallback {
                width: 76px;
                height: 76px;
            }
        }
    </style>
</head>

<body>
    <main class="card">
        <div id="loader-view" class="loader-view">
            <div class="loader"></div>
            <div>Yonlendiriliyor...</div>
        </div>

        <section id="desktop-view" class="desktop-view">
            <header class="brand">
                <img id="brand-logo" class="logo" src="./logo_icon.png" alt="Fallen Apps logo">
                <div id="logo-fallback" class="logo-fallback">FA</div>
                <h1>Fallen Apps</h1>
            </header>

            <div class="link-list">
                <a href="#" id="ios-link" class="store-link" target="_blank" rel="noopener noreferrer">
                    <svg class="store-icon" viewBox="0 0 384 512" aria-hidden="true">
                        <path
                            d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 52.3-11.4 69.5-34.3z" />
                    </svg>
                    App Store
                </a>

                <a href="#" id="android-link" class="store-link" target="_blank" rel="noopener noreferrer">
                    <svg class="store-icon" viewBox="0 0 576 512" aria-hidden="true">
                        <path
                            d="M420.55,301.93a24,24,0,1,1,24-24,24,24,0,0,1-24,24m-265.1,0a24,24,0,1,1,24-24,24,24,0,0,1-24,24m273.7-144.48,47.94-83a10,10,0,1,0-17.27-10l-48.54,84.07a301.25,301.25,0,0,0-246.56,0L116.18,64.45a10,10,0,1,0-17.27,10l47.94,83C64.53,202.22,8.24,285.55,0,384H576c-8.24-98.45-64.54-181.78-146.85-226.55" />
                    </svg>
                    Google Play
                </a>
            </div>

        </section>
    </main>

    <script>
        const IOS_DEVELOPER_URL = "https://apps.apple.com/tr/developer/hasan-enes-dirik/id1802764921?l";
        const ANDROID_DEVELOPER_URL = "https://play.google.com/store/apps/developer?id=Enes+Dirik&hl=en";

        function setupLogoFallback() {
            const logo = document.getElementById('brand-logo');
            const fallback = document.getElementById('logo-fallback');

            logo.addEventListener('error', () => {
                logo.style.display = 'none';
                fallback.style.display = 'flex';
            });
        }

        function detectAndRedirect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            document.getElementById('ios-link').href = IOS_DEVELOPER_URL;
            document.getElementById('android-link').href = ANDROID_DEVELOPER_URL;

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.replace(IOS_DEVELOPER_URL);
                return;
            }

            if (/android/i.test(userAgent)) {
                window.location.replace(ANDROID_DEVELOPER_URL);
                return;
            }

            document.getElementById('loader-view').style.display = 'none';
            document.getElementById('desktop-view').style.display = 'block';
        }

        setupLogoFallback();
        window.onload = detectAndRedirect;
    </script>
</body>

</html>
